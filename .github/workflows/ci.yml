name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint (ruff)
        run: ruff check .

      - name: Validate portable skill export
        run: python3 scripts/export_skills.py --list

      - name: Validate plugin manifests are well-formed JSON
        run: |
          python - <<'PY'
          import glob, json
          paths = [".claude-plugin/marketplace.json"]
          paths += sorted(glob.glob("plugins/*/.claude-plugin/plugin.json"))
          assert len(paths) > 1, "no per-plugin manifests found under plugins/*/.claude-plugin/"
          for path in paths:
              json.load(open(path))
              print(f"{path} OK")
          PY

      - name: Compile all skill scripts
        run: python -m compileall -q plugins

      - name: Run tests
        run: python -m unittest discover -s tests -t .

      - name: config-chunks smoke (engine + reconcile)
        run: bash plugins/config-chunks/scripts/test/smoke.sh

  # The session-tracker utility package is TypeScript + Bun; typecheck it on its own.
  session-tracker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugins/session-tracker
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck (tsc --noEmit)
        run: bun run typecheck

# Note: `claude plugin validate .` is the authoritative Claude-adapter manifest
# check (see CONTRIBUTING.md), but it requires the Claude Code CLI. CI does the
# lightweight JSON-structure check above; run the full validator locally when
# touching Claude adapter manifests.
